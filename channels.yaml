# TikTok → YouTube Channel Pairs
# ────────────────────────────────────────────────────────────────────────────
# Adding a new channel = add an entry here + run: python onboard_channel.py
# No code changes needed.
#
# Field reference:
#   id                    Unique string ID. Used in DB, logs, and CLI flags.
#   tiktok_username       TikTok @handle WITHOUT the @ symbol.
#   youtube_channel_name  Display name (for logging only, not used in API calls).
#   google_credentials_file  Path to client_secret.json from Google Cloud Console.
#   oauth_token_file      Path to saved OAuth token (auto-created on first auth).
#   videos_per_day        How many videos to upload per day (2 = 2 slots/day).
#   description_footer    Text appended to every video description. Can be empty.
#   default_tags          Tags added to every upload for this channel.
#   youtube_category_id   YouTube category: 22=People & Blogs, 26=How-to & Style.
#   enabled               Set to false to pause a channel without removing it.
#   max_retry_days        Days to retry a failed download before giving up.
#   shorts_max_seconds    Videos <= this duration (and vertical) upload as Shorts.
#   min_upload_date       Optional YYYY-MM-DD. Ignore TikTok videos older than this date.
#                         Useful for monetised channels that should only post recent content.
#   min_backlog_for_slot1 Optional int. Slot 1 is skipped unless this many unuploaded
#                         eligible videos exist. Use with min_upload_date to drop to 1/day
#                         automatically once the backlog runs out.
#   upload_mode           Controls what gets uploaded per slot (default: short_only).
#                           short_only    Original 9:16 as Short (or regular if long/horizontal).
#                                         Existing behaviour — all current channels use this.
#                           dual          Upload Short + 4:3 blurred-fill longform from same source.
#                                         Counts as 2 uploads per slot. Requires ffmpeg.
#                           longform_only Upload ONLY the 4:3 blurred-fill version (no Short).
#                                         Requires ffmpeg for vertical source videos.
#                           split         Slot 1 uploads a fresh TikTok as Short (9:16).
#                                         Slot 2 uploads a completely different TikTok as 4:3 longform.
#                                         Cross-format exclusion: same video is never re-used across slots.
#   longform_title_suffix Optional text appended to the title for longform (4:3) uploads.
#                         E.g. " | Full Video". Only used in dual/longform_only/split modes.
# ────────────────────────────────────────────────────────────────────────────

channels:
  - id: channel_4
    tiktok_username: "aiivannaa"
    youtube_channel_name: "aiivannaa"
    google_credentials_file: "credentials/channel_4_client_secret.json"
    oauth_token_file: "tokens/channel_4_token.json"
    videos_per_day: 2
    description_footer: ""
    default_tags:
      - aiivannaa
      - viral
      - trending
    youtube_category_id: "22"
    enabled: true
    max_retry_days: 7
    shorts_max_seconds: 180
    upload_mode: short_only
    slot_publish_times_utc:
      1: "15:00"   # PUBLIC at 5 PM CEST (UTC+2, France) — uploaded 2h earlier at 13:00 UTC
      2: "17:00"   # PUBLIC at 7 PM CEST (UTC+2, France) — uploaded 2h earlier at 15:00 UTC
